<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <style>
        .container{
            width: 500px;
            height: 350px;
            border: 8px  ridge lightgray;
            border-radius: 15px;
           margin: auto;
           margin-top: 20px;
           background-color: rgb(43, 74, 97);
            
        }
        .bmi{

             margin-left: 100px;
             padding: 10px;
        }
        .bmi label{
            font-size: 20px;
            font-weight: 500;
            color:cornsilk;
        }
        button{
            margin-left: 100px;
            margin-top: 10px;
            width: 150px;
            padding: 5px;
            background-color:aliceblue;
            border-radius: 10px;
            font-size: 15px;
        }
        .bmi input{

            border-width: 2px;
            border-radius: 5px;
            
            height: 20px;


        }



    </style>
</head>
<body>
    <script src="bmi.js"></script>
   <div class="container">
    <h1 style="text-align: center; color:cornsilk;">BMI Calculator</h1><hr> 
    <div class="bmi">
    
    

    <label for="one">Weight (kg):</label>
    <input type="number" id="one" required>
    <br><br>
    <label for="two">Height (cm):</label>
    <input type="number" id="two" required>
    <br><br>
    <button type="button" onclick="display()">Calculate BMI</button>
    <p id="result" style="font-size: large; text-align: center; color: aliceblue;"></p>
    <p id="result1" style="font-size: large; text-align: center; color: aliceblue;"></p>
</div>
</div>
</body>
</html>
